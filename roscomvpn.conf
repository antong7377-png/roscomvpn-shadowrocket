RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/escapefromtarkov.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/twitch.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/pinterest.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/faceit.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/private.list,DIRECT

# ===== DIRECT: приватные IP =====
RULE-SET,https://raw.githubusercontent.com/antong7377-png/roscomvpn-shadowrocket/main/ip-private.list,DIRECT

# ===== DIRECT: российские IP =====
GEOIP,RU,DIRECT

# ===== всё остальное через прокси =====
FINAL,PROXY,dns-failed

[URL Rewrite]
^https?:\/\/pagead2\.googlesyndication\.com\/pagead\/.* url reject
^https?:\/\/adservice\.google\.com\/.* url reject
^https?:\/\/www\.google-analytics\.com\/.* url reject

[Host]
localhost = 127.0.0.1
